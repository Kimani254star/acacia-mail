<script>

const USERS_KEY = 'users';               // shared with Acacia ERP / Expense
const SESSION_KEY = 'acacia_session';
const DATA_KEY_PREFIX = 'acacia_data_';

/* Supabase client (shared project with Acacia ERP) */
const sb = window.supabase.createClient(window.__SUPA_URL__, window.__SUPA_KEY__);

function toCompanyId(name){ return 'comp_' + String(name||'').toLowerCase().replace(/[^a-z0-9]/g,'_'); }
function loadUsers(){ try{ return JSON.parse(localStorage.getItem(USERS_KEY)||'[]'); }catch{return[]} }
function saveUsersLocal(u){ localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
function currentUser(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); }catch{return null} }

async function fetchUsersCloud(){
  try{
    const { data } = await sb.from('app_state').select('value').eq('key','users').maybeSingle();
    if(Array.isArray(data?.value)){ saveUsersLocal(data.value); return data.value; }
  }catch(e){ console.warn('users fetch failed',e); }
  return loadUsers();
}
async function saveUsersCloud(users){
  saveUsersLocal(users);
  try{
    await sb.from('app_state').upsert({ key:'users', value:users, updated_at:new Date().toISOString() }, { onConflict:'key' });
  }catch(e){ console.warn('users save failed',e); }
}

function switchAuthTab(t){
  const inSel = t==='signin';
  document.getElementById('tabSignIn').classList.toggle('text-acacia-700',inSel);
  document.getElementById('tabSignIn').classList.toggle('border-acacia-600',inSel);
  document.getElementById('tabSignIn').classList.toggle('text-slate-500',!inSel);
  document.getElementById('tabSignIn').classList.toggle('border-transparent',!inSel);
  document.getElementById('tabSignUp').classList.toggle('text-acacia-700',!inSel);
  document.getElementById('tabSignUp').classList.toggle('border-acacia-600',!inSel);
  document.getElementById('tabSignUp').classList.toggle('text-slate-500',inSel);
  document.getElementById('tabSignUp').classList.toggle('border-transparent',inSel);
  document.getElementById('signinForm').classList.toggle('hidden',!inSel);
  document.getElementById('signupForm').classList.toggle('hidden',inSel);
}

async function doSignIn(e){
  e.preventDefault();
  const err = document.getElementById('siError');
  err.classList.add('hidden');
  const company = document.getElementById('siCompany').value.trim();
  const email = document.getElementById('siEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('siPass').value;
  if(!company || !email){ err.textContent='Company name and email are required.'; err.classList.remove('hidden'); return; }
  const users = await fetchUsersCloud();
  const compId = toCompanyId(company);
  const match = users.find(u=>{
    const uEmail = (u.email||'').toLowerCase();
    const uCompId = u.companyId || toCompanyId(u.companyName||'');
    return uEmail===email && uCompId===compId;
  });
  if(!match){ err.textContent='No matching Acacia ERP account for that company + email.'; err.classList.remove('hidden'); return; }
  if(match.password && match.password!==pass){ err.textContent='Incorrect password.'; err.classList.remove('hidden'); return; }
  const session = { email:match.email, name:match.fullName||match.username||email, companyId:compId, companyName:match.companyName||company };
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
  bootApp();
}

function quickSignIn(email, company){
  document.getElementById('siEmail').value = email;
  if(company) document.getElementById('siCompany').value = company;
  document.getElementById('siPass').focus();
}

function renderAuthAccounts(){
  const users = loadUsers();
  const wrap = document.getElementById('siAccounts');
  const list = document.getElementById('siAccountsList');
  if(!wrap || !list) return;
  if(!users.length){ wrap.classList.add('hidden'); return; }
  wrap.classList.remove('hidden');
  list.innerHTML = users.map(u=>{
    const name = u.fullName || u.username || u.email;
    const comp = u.companyName || '';
    return `<button type="button" onclick="quickSignIn('${escapeHtml(u.email)}','${escapeHtml(comp)}')" class="w-full flex items-center gap-3 p-2 rounded-lg border border-slate-200 hover:border-acacia-400 hover:bg-acacia-50 text-left">
      <div class="w-8 h-8 rounded-full bg-acacia-700 text-white flex items-center justify-center text-xs font-bold">${initials(name)}</div>
      <div class="flex-1 min-w-0"><div class="text-sm font-medium truncate">${escapeHtml(name)}</div><div class="text-[11px] text-slate-500 truncate">${escapeHtml(u.email)}${comp?' · '+escapeHtml(comp):''}</div></div>
    </button>`;
  }).join('');
}

async function doSignUp(e){
  e.preventDefault();
  const err = document.getElementById('suError');
  err.classList.add('hidden');
  const company = document.getElementById('suCompany').value.trim();
  const first = document.getElementById('suFirst').value.trim();
  const last  = document.getElementById('suLast').value.trim();
  const email = document.getElementById('suEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('suPass').value;
  if(!company || !email){ err.textContent='Company name and email are required.'; err.classList.remove('hidden'); return; }
  const users = await fetchUsersCloud();
  const compId = toCompanyId(company);
  if(users.some(u=>(u.email||'').toLowerCase()===email)){
    err.textContent='Email already registered — use Sign In instead.'; err.classList.remove('hidden'); return;
  }
  const rec = {
    username: email.split('@')[0],
    email, password: pass,
    fullName: ((first+' '+last).trim())||email,
    role:'admin', companyId:compId, companyName:company,
    registered:new Date().toISOString(), status:'active', modules:[]
  };
  users.push(rec);
  await saveUsersCloud(users);
  localStorage.setItem(SESSION_KEY, JSON.stringify({ email:rec.email, name:rec.fullName, companyId:compId, companyName:company }));
  bootApp();
}

function signOut(){ localStorage.removeItem(SESSION_KEY); location.reload(); }


let store = { mails:[], events:[], aiChat:[] };
function dataKey(){ const u=currentUser(); return DATA_KEY_PREFIX + (u?.email||'anon'); }
function loadStore(){
  try{ store = JSON.parse(localStorage.getItem(dataKey())) || {mails:[],events:[],aiChat:[]}; }
  catch{ store = {mails:[],events:[],aiChat:[]}; }
  store.mails ??= []; store.events ??= []; store.aiChat ??= [];
}
function saveStore(){ localStorage.setItem(dataKey(), JSON.stringify(store)); }


function bootApp(){
  const u = currentUser();
  if(!u){
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    document.getElementById('app').classList.remove('flex');
    // Account chips only appear after sign-in (in Settings → Registered accounts)
    return;
  }
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('app').classList.add('flex');
  document.getElementById('userAvatar').textContent = initials(u.name||u.email);
  loadStore();
  switchView('mail');
}

let currentView='mail';
function switchView(v){
  currentView=v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===v));
  const ws=document.getElementById('workspace');
  if(v==='mail') renderMailView(ws);
  else if(v==='calendar') renderCalendarView(ws);
  else if(v==='reports') renderReportsView(ws);
  else if(v==='ai') renderAiView(ws);
  else if(v==='settings'){ renderSettingsView(ws); fetchUsersCloud().then(()=>renderSettingsView(ws)); }
}

function folderMatch(m, fid) {

  switch (fid) {

    case "starred":
      return m.starred && m.folder !== "trash";

    case "important":
      return m.important === true && m.folder !== "trash";

    case "archive":
      return m.folder === "archive";

    case "spam":
      return m.folder === "spam";

    case "junk":
      return m.folder === "junk";

    case "scheduled":
      return m.folder === "scheduled";

    case "outbox":
      return m.folder === "outbox";

    case "allmail":
      return m.folder !== "trash";

    case "promotions":
      return m.category === "promotions" && m.folder !== "trash";

    case "social":
      return m.category === "social" && m.folder !== "trash";

    case "updates":
      return m.category === "updates" && m.folder !== "trash";

    case "forums":
      return m.category === "forums" && m.folder !== "trash";

    case "notes":
      return m.category === "notes" && m.folder !== "trash";

    default:
      return m.folder === fid;
  }

}

function renderFolders() {

  const unread = store.mails.filter(m => !m.read && m.folder === "inbox").length;

  document.getElementById("folderNav").innerHTML = FOLDERS.map(f => {

    const count = store.mails.filter(m => folderMatch(m, f.id)).length;

    const active = mailCurrent.folder === f.id;

    let badge = "";

    if (f.id === "inbox") {

      badge = unread
        ? `<span class="ml-auto text-[11px] bg-acacia-600 text-white rounded-full px-2 py-0.5">${unread}</span>`
        : "";

    } else if (count) {

      badge = `<span class="ml-auto text-xs text-slate-400">${count}</span>`;

    }

    return `
      <button
        onclick="selectFolder('${f.id}')"
        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left transition ${
          active
            ? "bg-acacia-50 text-acacia-800 font-semibold"
            : "text-slate-700 hover:bg-slate-100"

  }).join("");

}

function calNav(d){ calCursor.setMonth(calCursor.getMonth()+d); drawCalendar(); }
function calToday(){ calCursor=new Date(); calCursor.setDate(1); drawCalendar(); }
function drawCalendar(){
  const y=calCursor.getFullYear(), m=calCursor.getMonth();
  document.getElementById('calTitle').textContent = calCursor.toLocaleDateString(undefined,{month:'long',year:'numeric'});
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);
  let cells='';
  for(let i=0;i<42;i++){
    const dayNum=i-first+1;
    const inMonth = dayNum>=1 && dayNum<=days;
    const cellDate = new Date(y,m,dayNum);
    const isToday = inMonth && cellDate.getTime()===today.getTime();
    const dayEvents = inMonth ? store.events.filter(e=>sameDay(new Date(e.start), cellDate)) : [];
    cells += `<div class="border-r border-b border-slate-100 p-1.5 text-xs ${inMonth?'':'bg-slate-50 text-slate-300'} min-h-0 overflow-hidden">
      <div class="flex justify-end"><span class="${isToday?'bg-acacia-600 text-white':''} w-6 h-6 flex items-center justify-center rounded-full text-[11px]">${inMonth?dayNum:''}</span></div>
      ${dayEvents.slice(0,3).map(e=>`<div class="mt-1 truncate text-[11px] px-1.5 py-0.5 rounded bg-acacia-100 text-acacia-800">${escapeHtml(e.title)}</div>`).join('')}
      ${dayEvents.length>3?`<div class="text-[10px] text-slate-400 mt-0.5">+${dayEvents.length-3} more</div>`:''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = cells;
  const upcoming = store.events.filter(e=>new Date(e.start)>=new Date()).sort((a,b)=>a.start-b.start).slice(0,8);
  document.getElementById('upcomingList').innerHTML = upcoming.length ? upcoming.map(e=>`
    <div class="bg-white p-3 rounded-lg border border-slate-200">
      <div class="text-xs text-acacia-600 font-semibold">${new Date(e.start).toLocaleString(undefined,{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
      <div class="text-sm font-medium mt-0.5">${escapeHtml(e.title)}</div>
      ${e.notes?`<div class="text-xs text-slate-500 mt-1">${escapeHtml(e.notes)}</div>`:''}
      <button onclick="deleteEvent('${e.id}')" class="text-[11px] text-red-500 mt-2 hover:underline">Delete</button>
    </div>`).join('') : `<p class="text-xs text-slate-400">No upcoming events.</p>`;
}
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function openEventModal(preset){
  const now = preset?.start ? new Date(preset.start) : new Date(Date.now()+60*60*1000);
  const iso = new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
  const wrap = document.createElement('div');
  wrap.id = 'evtModal';
  wrap.className = 'fixed inset-0 z-50 bg-slate-900/50 flex items-center justify-center p-4';
  wrap.innerHTML = `<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden fade-in">

      <div class="font-semibold text-slate-800">New event</div>
      <button onclick="closeEventModal()" class="text-slate-400 hover:text-slate-700 text-xl leading-none">×</button>
    </div>
    <form onsubmit="saveEvent(event)" class="p-5 space-y-3">
      <div><label class="text-xs font-semibold text-slate-600">Title</label>
        <input id="evTitle" required value="${escapeHtml(preset?.title||'')}" class="w-full mt-1 h-10 px-3 rounded-lg border border-slate-300 focus:border-acacia-500 outline-none text-sm"/></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-slate-600">Start</label>
          <input id="evStart" type="datetime-local" required value="${iso}" class="w-full mt-1 h-10 px-3 rounded-lg border border-slate-300 outline-none text-sm"/></div>
        <div><label class="text-xs font-semibold text-slate-600">Duration</label>
          <select id="evDur" class="w-full mt-1 h-10 px-2 rounded-lg border border-slate-300 outline-none text-sm">
            <option value="30">30 min</option><option value="60" selected>1 hour</option>
            <option value="90">1.5 hours</option><option value="120">2 hours</option><option value="1440">All day</option>
          </select></div>
      </div>
      <div><label class="text-xs font-semibold text-slate-600">Notes</label>
        <textarea id="evNotes" rows="3" class="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 outline-none text-sm">${escapeHtml(preset?.notes||'')}</textarea></div>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" onclick="closeEventModal()" class="h-9 px-4 rounded-md border border-slate-300 text-sm">Cancel</button>
        <button class="h-9 px-4 rounded-md bg-acacia-600 hover:bg-acacia-700 text-white text-sm font-semibold">Save event</button>
      </div>
    </form></div>`;
  document.body.appendChild(wrap);
  setTimeout(()=>document.getElementById('evTitle').focus(),50);
}
function closeEventModal(){ document.getElementById('evtModal')?.remove(); }
function saveEvent(e){
  e.preventDefault();
  const title=document.getElementById('evTitle').value.trim();
  const start=Date.parse(document.getElementById('evStart').value);
  const dur=parseInt(document.getElementById('evDur').value,10);
  const notes=document.getElementById('evNotes').value.trim();
  if(!title||isNaN(start)) return;
  store.events.push({id:'e'+Date.now(),title,start,dur,notes}); saveStore();
  closeEventModal(); drawCalendar();
}
function deleteEvent(id){ store.events=store.events.filter(e=>e.id!==id); saveStore(); drawCalendar(); }

      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-acacia-500 to-acacia-700 flex items-center justify-center text-white mr-3">✨</div>
      <div><div class="font-semibold text-slate-800">Acacia AI Assistant</div><div class="text-xs text-slate-500">Ask about your mail, calendar, or drafts.</div></div>
      <button onclick="store.aiChat=[];saveStore();switchView('ai')" class="ml-auto text-xs text-slate-500 hover:text-acacia-700">Clear chat</button>
    </div>
    <div id="aiMessages" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50"></div>
    <form onsubmit="aiSend(event)" class="p-4 border-t border-slate-200 flex gap-2 bg-white">
      <input id="aiInput" placeholder="Ask me anything…" class="flex-1 h-11 px-4 rounded-full bg-slate-100 focus:bg-white border border-transparent focus:border-acacia-400 outline-none text-sm"/>
      <button class="h-11 px-5 rounded-full bg-acacia-600 hover:bg-acacia-700 text-white font-semibold text-sm">Send</button>
    </form>
  </div>`;
  drawAiMessages();
}
function drawAiMessages(){
  const box=document.getElementById('aiMessages');
  if(!store.aiChat.length){
    box.innerHTML = `<div class="text-center text-slate-400 mt-8">
      <div class="text-5xl">✨</div>
      <p class="mt-3 text-sm">Try asking:</p>
      <div class="mt-2 flex flex-wrap gap-2 justify-center">
        ${['Summarize my unread','What is on my week','Find invoice','Draft a thank-you','Draft a meeting request','Archive read','Help'].map(s=>`<button onclick="aiQuick('${s.replace(/'/g,"\\'")}')" class="text-xs bg-white border border-slate-200 rounded-full px-3 py-1 hover:bg-acacia-50">${s}</button>`).join('')}
      </div></div>`;
    return;
  }
  box.innerHTML = store.aiChat.map(m=>`
    <div class="flex ${m.role==='user'?'justify-end':'justify-start'}">
      <div class="max-w-lg px-4 py-2.5 rounded-2xl text-sm ${m.role==='user'?'bg-acacia-600 text-white':'bg-white border border-slate-200 text-slate-700'}">${escapeHtml(m.text).replace(/\n/g,'<br>')}</div>
    </div>`).join('');
  box.scrollTop=box.scrollHeight;
}
function aiQuick(t){ document.getElementById('aiInput').value=t; aiSend(new Event('submit')); }
function aiSend(e){
  e.preventDefault();
  const input=document.getElementById('aiInput'); const txt=input.value.trim(); if(!txt) return;
  store.aiChat.push({role:'user',text:txt}); input.value='';
  const reply = aiRespond(txt);
  store.aiChat.push({role:'assistant',text:reply}); saveStore(); drawAiMessages();
}
function aiRespond(q){
  const s=q.toLowerCase().trim();
  const me = currentUser()?.name || 'me';

  if(/^(hi|hello|hey|yo)\b/.test(s)) return `Hi ${me.split(' ')[0]}! I can summarize mail, check your calendar, draft replies, star or clean up messages. Try "what's on my week" or "draft a thank-you".`;
  if(/help|what can you/.test(s)) return "I can:\n• summarize unread mail\n• show today's or this week's schedule\n• count sent, received, starred\n• find messages ('find X')\n• draft: follow-up, thank-you, meeting request, out-of-office\n• clean inbox ('archive read')";

  if(/summar|unread/.test(s)){
    const u=store.mails.filter(m=>!m.read && m.folder==='inbox');
    if(!u.length) return "You have no unread messages. Inbox zero — nicely done.";
    return `You have ${u.length} unread message${u.length>1?'s':''}:\n`+u.slice(0,6).map(m=>`• ${m.from} — ${m.subject}`).join('\n');
  }
  if(/week|next 7|upcoming/.test(s)){
    const now=Date.now(), end=now+7*86400000;
    const e=store.events.filter(ev=>ev.start>=now && ev.start<=end).sort((a,b)=>a.start-b.start);
    if(!e.length) return "Nothing scheduled in the next 7 days.";
    return "This week:\n"+e.map(ev=>`• ${new Date(ev.start).toLocaleString([],{weekday:'short',hour:'2-digit',minute:'2-digit'})} — ${ev.title}`).join('\n');
  }
  if(/today|calendar|schedule/.test(s)){
    const today=new Date(); today.setHours(0,0,0,0);
    const e=store.events.filter(ev=>sameDay(new Date(ev.start),today)).sort((a,b)=>a.start-b.start);
    if(!e.length) return "Nothing on your calendar today.";
    return "Today's schedule:\n"+e.map(ev=>`• ${new Date(ev.start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} — ${ev.title}`).join('\n');
  }
  if(/star/.test(s)){
    const st=store.mails.filter(m=>m.starred);
    return st.length ? `You have ${st.length} starred message${st.length>1?'s':''}:\n`+st.slice(0,5).map(m=>`• ${m.from} — ${m.subject}`).join('\n') : "No starred messages yet.";
  }
  if(/how many|count|stats|sent|received/.test(s)){
    return `📊 Stats\n• Sent: ${store.mails.filter(m=>m.folder==='sent').length}\n• Inbox: ${store.mails.filter(m=>m.folder==='inbox').length}\n• Unread: ${store.mails.filter(m=>!m.read && m.folder==='inbox').length}\n• Starred: ${store.mails.filter(m=>m.starred).length}\n• Events: ${store.events.length}`;
  }
  const findMatch = s.match(/(?:find|search|show)\s+(?:mail(?:s)?\s+)?(?:about|from|with)?\s*(.+)/);
  if(findMatch){
    const q2=findMatch[1].trim();
    const hits=store.mails.filter(m=>(m.subject+m.from+m.preview).toLowerCase().includes(q2));
    return hits.length ? `Found ${hits.length} matching "${q2}":\n`+hits.slice(0,6).map(m=>`• ${m.from} — ${m.subject}`).join('\n') : `No messages match "${q2}".`;
  }
  if(/archive read|clean inbox|clean up/.test(s)){
    const before=store.mails.filter(m=>m.folder==='inbox'&&m.read).length;
    store.mails.forEach(m=>{ if(m.folder==='inbox'&&m.read) m.folder='archive'; });
    saveStore();
    return before ? `Archived ${before} read message${before>1?'s':''} from your inbox.` : "Nothing to archive — no read messages in the inbox.";
  }
  if(/thank/.test(s)) return `Draft:\n\nHi,\n\nThank you so much for your time and thoughtful reply — it's very much appreciated. I'll follow up shortly with next steps.\n\nBest,\n${me}`;
  if(/out.?of.?office|ooo|away/.test(s)) return `Draft (auto-reply):\n\nHello,\n\nThanks for your message. I'm currently out of the office and will respond when I return. For urgent matters, please reach my team.\n\nBest,\n${me}`;
  if(/meeting|invite|schedule\s+(a|an)/.test(s)) return `Draft:\n\nHi,\n\nCould we grab 30 minutes this week to align? I'm open Tue–Thu afternoons — happy to send an invite once you share a preferred time.\n\nBest,\n${me}`;
  if(/draft|write|follow.?up|reply/.test(s)) return `Draft:\n\nHi there,\n\nJust following up on our last conversation. Let me know if there's anything I can do to help move this forward.\n\nBest,\n${me}`;

  return "I'm your local assistant. Try: \"summarize unread\", \"what's on my week\", \"find invoice\", \"draft a thank-you\", or \"archive read\".";
}

function renderSettingsView(root){
  const u=currentUser(); const all=loadUsers();
  root.innerHTML = `<div class="flex-1 overflow-y-auto p-8 bg-slate-50">
    <h2 class="text-2xl font-bold text-slate-800">Settings</h2>
    <p class="text-sm text-slate-500 mb-6">Manage your account and workspace.</p>

    <div class="max-w-3xl space-y-6">
      <section class="bg-white p-6 rounded-xl border border-slate-200">
        <h3 class="font-semibold text-slate-800 mb-4">Your account</h3>
        <div class="flex items-center gap-4">
          <div class="w-16 h-16 rounded-full bg-acacia-700 text-white flex items-center justify-center font-bold text-xl">${initials(u.name||u.email)}</div>
          <div><div class="font-semibold text-slate-800">${escapeHtml(u.name||'')}</div><div class="text-sm text-slate-500">${escapeHtml(u.email)}</div></div>
        </div>
        <form onsubmit="updateProfile(event)" class="mt-5 grid grid-cols-2 gap-4">
          <div><label class="text-xs font-semibold text-slate-600">Display name</label>
            <input id="stName" value="${escapeHtml(u.name||'')}" class="w-full mt-1 h-10 px-3 rounded-lg border border-slate-300 outline-none text-sm"/></div>
          <div><label class="text-xs font-semibold text-slate-600">Email (read-only)</label>
            <input value="${escapeHtml(u.email)}" disabled class="w-full mt-1 h-10 px-3 rounded-lg border border-slate-200 bg-slate-50 text-sm"/></div>
          <div class="col-span-2"><button class="h-10 px-5 rounded-md bg-acacia-600 hover:bg-acacia-700 text-white text-sm font-semibold">Save</button></div>
        </form>
      </section>

      <section class="bg-white p-6 rounded-xl border border-slate-200">
        <h3 class="font-semibold text-slate-800 mb-4">Change password</h3>
        <form onsubmit="changePassword(event)" class="grid grid-cols-2 gap-4">
          <div><label class="text-xs font-semibold text-slate-600">Current password</label>
            <input id="pwOld" type="password" required class="w-full mt-1 h-10 px-3 rounded-lg border border-slate-300 outline-none text-sm"/></div>
          <div><label class="text-xs font-semibold text-slate-600">New password</label>
            <input id="pwNew" type="password" required minlength="6" class="w-full mt-1 h-10 px-3 rounded-lg border border-slate-300 outline-none text-sm"/></div>
          <div class="col-span-2"><button class="h-10 px-5 rounded-md bg-acacia-600 hover:bg-acacia-700 text-white text-sm font-semibold">Update password</button></div>
        </form>
      </section>

      <section class="bg-white p-6 rounded-xl border border-slate-200">
        <h3 class="font-semibold text-slate-800 mb-2">Create additional account</h3>
        <p class="text-sm text-slate-500 mb-4">Add another workspace account. You can sign in with either.</p>
        <form onsubmit="createAdditional(event)" class="grid grid-cols-2 gap-4">
          <div class="col-span-2"><label class="text-xs font-semibold text-slate-600">Full name</label>
            <input id="caName" required class="w-full mt-1 h-10 px-3 rounded-lg border border-slate-300 outline-none text-sm"/></div>
          <div><label class="text-xs font-semibold text-slate-600">Email</label>
            <input id="caUser" type="email" required placeholder="colleague@company.com" class="w-full mt-1 h-10 px-3 rounded-lg border border-slate-300 outline-none text-sm"/></div>
          <div><label class="text-xs font-semibold text-slate-600">Password</label>
            <input id="caPass" type="password" required minlength="6" class="w-full mt-1 h-10 px-3 rounded-lg border border-slate-300 outline-none text-sm"/></div>
          <div class="col-span-2"><button class="h-10 px-5 rounded-md bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold">Create account</button></div>
        </form>
      </section>

      <section class="bg-white p-6 rounded-xl border border-slate-200">
        <h3 class="font-semibold text-slate-800 mb-4">Registered accounts (${all.length})</h3>
        <div class="space-y-2">
          ${all.map(a=>`<div class="flex items-center justify-between p-3 rounded-lg border border-slate-100">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-acacia-700 text-white flex items-center justify-center text-xs font-bold">${initials(a.fullName||a.name||a.email)}</div>
              <div><div class="text-sm font-medium">${escapeHtml(a.fullName||a.name||'')}</div><div class="text-xs text-slate-500">${escapeHtml(a.email)}${a.companyName?' · '+escapeHtml(a.companyName):''}</div></div>
            </div>
            ${a.email===u.email?'<span class="text-xs text-emerald-600 font-semibold">Current</span>':`<button onclick="deleteAccount('${a.email}')" class="text-xs text-red-500 hover:underline">Delete</button>`}
          </div>`).join('')}
        </div>
      </section>

      <section class="bg-white p-6 rounded-xl border border-red-200">
        <h3 class="font-semibold text-red-700 mb-2">Danger zone</h3>
        <button onclick="clearMyData()" class="h-9 px-4 rounded-md border border-red-300 text-red-600 hover:bg-red-50 text-sm font-semibold">Clear all my data</button>
      </section>
    </div>
  </div>`;
}
async function updateProfile(e){ e.preventDefault(); const name=document.getElementById('stName').value.trim(); const users=await fetchUsersCloud(); const u=currentUser(); const rec=users.find(x=>x.email===u.email); if(rec){ rec.fullName=name; await saveUsersCloud(users); localStorage.setItem(SESSION_KEY,JSON.stringify({...u,name})); document.getElementById('userAvatar').textContent=initials(name||u.email);} alert('Profile updated.'); switchView('settings'); }
async function changePassword(e){ e.preventDefault(); const oldP=document.getElementById('pwOld').value; const newP=document.getElementById('pwNew').value; const users=await fetchUsersCloud(); const u=currentUser(); const rec=users.find(x=>x.email===u.email); if(!rec||(rec.password||'')!==oldP){ alert('Current password is incorrect.'); return; } rec.password=newP; await saveUsersCloud(users); alert('Password updated.'); switchView('settings'); }
async function createAdditional(e){ e.preventDefault(); const name=document.getElementById('caName').value.trim(); const email=(document.getElementById('caUser').value.trim().toLowerCase()); const pass=document.getElementById('caPass').value; if(!email.includes('@')){ alert('Enter a full email address.'); return; } const users=await fetchUsersCloud(); if(users.some(x=>(x.email||'').toLowerCase()===email)){ alert('That email already exists.'); return; } const u=currentUser(); users.push({username:email.split('@')[0], email, password:pass, fullName:name||email, role:'user', companyId:u.companyId, companyName:u.companyName, registered:new Date().toISOString(), status:'active', modules:[]}); await saveUsersCloud(users); alert('Account created: '+email); switchView('settings'); }
async function deleteAccount(email){ if(!confirm('Delete '+email+'?')) return; const users=(await fetchUsersCloud()).filter(x=>x.email!==email); await saveUsersCloud(users); localStorage.removeItem(DATA_KEY_PREFIX+email); switchView('settings'); }
function clearMyData(){ if(!confirm('Clear all mail, events and AI chat?')) return; store={mails:[],events:[],aiChat:[]}; saveStore(); switchView(currentView); }


function initials(n){ return (n||'?').split(/\s+/).filter(Boolean).map(s=>s[0]).slice(0,2).join('').toUpperCase(); }
function avatarColor(n){ const c=['#0f5fd1','#0d9488','#7c3aed','#db2777','#f59e0b','#059669','#ea580c','#4f46e5']; let h=0; for(const ch of (n||'')) h=(h*31+ch.charCodeAt(0))>>>0; return c[h%c.length]; }
function timeAgo(t){ const s=(Date.now()-t)/1000; if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m'; if(s<86400) return Math.floor(s/3600)+'h'; return new Date(t).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function emptyState(title,sub){ return `<div class="p-10 text-center text-slate-400 text-sm"><div class="font-semibold text-slate-500">${title}</div><div class="mt-1">${sub}</div></div>`; }
function emptyPane(title,sub){ return `<div class="flex-1 flex flex-col items-center justify-center text-slate-400"><svg class="w-16 h-16 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><div class="font-semibold">${title}</div><div class="text-sm mt-1">${sub}</div></div>`; }

document.addEventListener('input',(e)=>{ if(e.target.id==='searchInput' && currentView==='mail') renderList(); });


bootApp();
</script>
